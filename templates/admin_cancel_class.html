{% extends "admin_base.html" %}

{% block title %}Cancel Class{% endblock %}

{% block content %}

<style>
 .page-header {
    margin-bottom: 32px;
    text-align: center;
  } 
  .page-header h1 {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .page-header p {
    font-size: 15px;
    color: var(--muted);
  }

.form-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    max-width: 900px;
    margin: 0 auto;
  }
  

  .form-group {
    margin-bottom: 24px;
  }

  .form-group label.group-label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }

  select, input[type="date"], input[type="text"], textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color .15s, background .15s;
    font-family: inherit;
  }

  select:focus, input[type="date"]:focus,
  input[type="text"]:focus, textarea:focus {
    border-color: var(--teal);
    background: var(--white);
  }

  textarea { height: 110px; resize: vertical; }
  .slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .slot-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    user-select: none;
  }

  .slot-item:hover {
    border-color: var(--teal);
    background: var(--teal-lt);
  }

  .slot-item input[type="checkbox"] {
    width: 17px;
    height: 17px;
    accent-color: var(--teal);
    cursor: pointer;
    flex-shrink: 0;
  }

  .slot-item.checked {
    border-color: var(--teal);
    background: var(--teal-lt);
  }

  .slot-label {
    display: flex;
    flex-direction: column;
  }

  .slot-label .slot-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  .slot-label .slot-time {
    font-size: 12px;
    color: var(--muted);
    margin-top: 1px;
  }

  .form-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  .submit-row {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 14px;
    margin-top: 8px;
  }

  .cancel-btn {
    padding: 12px 24px;
    background: var(--bg);
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all .15s;
  }

  .cancel-btn:hover {
    border-color: var(--navy);
    color: var(--navy);
  }

  .submit-btn {
    padding: 12px 28px;
    background: var(--navy);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }

  .submit-btn:hover { background: var(--teal); }
</style>
<div class="page-header">
  <h1>Cancel Classroom Allocation</h1>
  <p>Select a class, date, and sessions to cancel and reallocate rooms.</p>
</div>

<div class="form-card">
  <form method="POST">

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px;">

      <div class="form-group" style="margin-bottom: 0;">
        <label class="group-label">Class</label>
        <select name="class_id" required>
          {% for c in classes %}
            <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group" style="margin-bottom: 0;">
        <label class="group-label">Date</label>
        <input type="date" name="date" required>
      </div>

    </div>  

    <hr class="form-divider">
    <div class="form-group">
      <label class="group-label">Sessions to Cancel</label>
      <div class="slot-grid">

        <label class="slot-item" id="slot1">
          <input type="checkbox" name="slots" value="8.00_-_8.45"
                 onchange="toggleSlot(this, 'slot1')">
          <div class="slot-label">
            <span class="slot-name">1st Hour</span>
            <span class="slot-time">8:00 – 8:45</span>
          </div>
        </label>

        <label class="slot-item" id="slot2">
          <input type="checkbox" name="slots" value="9.10_-_9.55"
                 onchange="toggleSlot(this, 'slot2')">
          <div class="slot-label">
            <span class="slot-name">2nd Hour</span>
            <span class="slot-time">9:10 – 9:55</span>
          </div>
        </label>

        <label class="slot-item" id="slot3">
          <input type="checkbox" name="slots" value="10.00_-_10.45"
                 onchange="toggleSlot(this, 'slot3')">
          <div class="slot-label">
            <span class="slot-name">3rd Hour</span>
            <span class="slot-time">10:00 – 10:45</span>
          </div>
        </label>

        <label class="slot-item" id="slot4">
          <input type="checkbox" name="slots" value="10.50_-_11.35"
                 onchange="toggleSlot(this, 'slot4')">
          <div class="slot-label">
            <span class="slot-name">4th Hour</span>
            <span class="slot-time">10:50 – 11:35</span>
          </div>
        </label>

        <label class="slot-item" id="slot5">
          <input type="checkbox" name="slots" value="11.55_-_12.40"
                 onchange="toggleSlot(this, 'slot5')">
          <div class="slot-label">
            <span class="slot-name">5th Hour</span>
            <span class="slot-time">11:55 – 12:40</span>
          </div>
        </label>

        <label class="slot-item" id="slot6">
          <input type="checkbox" name="slots" value="12.45_-_1.30"
                 onchange="toggleSlot(this, 'slot6')">
          <div class="slot-label">
            <span class="slot-name">6th Hour</span>
            <span class="slot-time">12:45 – 1:30</span>
          </div>
        </label>

      </div>
    </div>

    <hr class="form-divider">
    <div class="form-group">
      <label class="group-label">Reason</label>
      <input type="text" name="reason" placeholder="e.g. Staff meeting, Holiday..."
             required>
    </div>
    <div class="form-group">
      <label class="group-label">Description <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <textarea name="description"
                placeholder="Add any additional details..."></textarea>
    </div>
    <div class="submit-row">
      <a href="/admin" class="cancel-btn">Back</a>
      <button type="submit" class="submit-btn">Cancel Class</button>
    </div>

  </form>
</div>

<script>
  function toggleSlot(checkbox, id) {
    const label = document.getElementById(id);
    if (checkbox.checked) {
      label.classList.add('checked');
    } else {
      label.classList.remove('checked');
    }
  }
</script>

{% endblock %}
