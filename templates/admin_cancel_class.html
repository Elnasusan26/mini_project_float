<!DOCTYPE html>
<html>
<head>
<title>Cancel Class</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f6fa;
}

.container{
    width:900px;
    margin:auto;
    background:white;
    padding:40px;
    margin-top:40px;
    border-radius:8px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2{
    margin-bottom:30px;
    color:#2c3e50;
}

.form-row{
    display:flex;
    margin-bottom:25px;
    align-items:center;
}

.form-label{
    width:200px;
    font-weight:600;
    color:#555;
}

.form-input{
    flex:1;
}

select,input,textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:14px;
}

textarea{
    height:100px;
}

.slot-grid{
    display:grid;
    grid-template-columns: repeat(4,1fr);
    gap:15px;
}

.slot-item{
    display:flex;
    align-items:center;
    gap:8px;
}

button{
    background:#2c7be5;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    font-size:15px;
    cursor:pointer;
}

button:hover{
    background:#1a5fd0;
}

</style>
</head>

<body>

<div class="container">

<h2>Cancel Classroom Allocation</h2>

<form method="POST">

<div class="form-row">
<label class="form-label">Class</label>
<div class="form-input">
<select name="class_id" required>
{% for c in classes %}
<option value="{{c.id}}">{{c.name}}</option>
{% endfor %}
</select>
</div>
</div>


<div class="form-row">
<label class="form-label">Date</label>
<div class="form-input">
<input type="date" name="date" required>
</div>
</div>


<div class="form-row">
<label class="form-label">Session</label>
<div class="form-input">

<div class="slot-grid">

<label class="slot-item"><input type="checkbox" name="slots" value="8.00_-_8.45">1st Hour</label>
<label class="slot-item"><input type="checkbox" name="slots" value="9.10_-_9.55">2nd Hour</label>
<label class="slot-item"><input type="checkbox" name="slots" value="10.00_-_10.45">3rd Hour</label>
<label class="slot-item"><input type="checkbox" name="slots" value="10.50_-_11.35">4th Hour</label>
<label class="slot-item"><input type="checkbox" name="slots" value="11.55_-_12.40">5th Hour</label>
<label class="slot-item"><input type="checkbox" name="slots" value="12.45_-_1.30">6th Hour</label>

</div>

</div>
</div>


<div class="form-row">
<label class="form-label">Reason</label>
<div class="form-input">
<input type="text" name="reason" required>
</div>
</div>


<div class="form-row">
<label class="form-label">Description</label>
<div class="form-input">
<textarea name="description"></textarea>
</div>
</div>


<div style="text-align:right">
<button type="submit">Cancel Class</button>
</div>

</form>

</div>

</body>
</html>
