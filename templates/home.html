{% extends "admin_base.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}

<style>
  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 28px;
  }

  .overview-cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }

  .overview-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 40px;
    flex: 1;
    min-width: 200px;
    text-align: center;
  }

  .overview-card h2 {
    font-size: 48px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }

  .overview-card p {
    font-size: 15px;
    color: var(--muted);
  }
</style>

<h1 class="page-title">System Overview</h1>

<div class="overview-cards">
  <div class="overview-card">
    <h2>21</h2>
    <p>Permanent Classes</p>
  </div>
  <div class="overview-card">
    <h2>5</h2>
    <p>Floating Classes</p>
  </div>
  <div class="overview-card">
    <h2>3</h2>
    <p>Allocated Classes</p>
  </div>
</div>

{% endblock %}
