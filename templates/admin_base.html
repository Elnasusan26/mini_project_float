<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FloatED | {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_dashboard.css') }}">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #1a3c4d;
      --teal:    #1a7f7f;
      --teal-lt: #e6f5f5;
      --white:   #ffffff;
      --bg:      #f0f4f8;
      --text:    #1e2d3d;
      --muted:   #6b7f90;
      --border:  #dde5ed;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 28px 16px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-top {
      padding: 0 8px 24px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 20px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .logo::before {
      content: '🎓';
      width: 34px; height: 34px;
      background: var(--teal);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--muted);
      padding-left: 44px;
    }

    .sidebar-nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-top: 8px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background .15s, color .15s;
    }

    .sidebar-nav a:hover { background: var(--bg); color: var(--text); }
    .sidebar-nav a.active { background: var(--teal-lt); color: var(--teal); font-weight: 600; }

    .sidebar-bottom {
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .sidebar-bottom a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      transition: background .15s, color .15s;
    }

    .sidebar-bottom a:hover { background: #fff0f0; color: #c0392b; }

    .layout { display: flex; width: 100%; }

    .main-content {
      margin-left: 240px;
      flex: 1;
      padding: 36px;
      min-height: 100vh;
    }

    .flash-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .flash-popup {
      background: var(--white);
      border-radius: 14px;
      padding: 28px 32px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }

    .flash-popup p { font-size: 15px; color: var(--text); margin-bottom: 18px; }

    .flash-popup button {
      padding: 10px 28px;
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .flash-popup.success { border-top: 4px solid var(--teal); }
    .flash-popup.error   { border-top: 4px solid #c0392b; }
  </style>
</head>

<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-overlay">
      {% for category, message in messages %}
        <div class="flash-popup {{ category }}">
          <p>{{ message }}</p>
          <button onclick="closePopup()">OK</button>
        </div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}

<div class="layout">
  <aside class="sidebar">
    <div>
      <div class="sidebar-top">
        <h2 class="logo">FloatED</h2>
        <span class="subtitle">Administrator</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/admin" {% if request.path == '/admin' %}class="active"{% endif %}>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="/admin_upload" {% if request.path == '/admin_upload' %}class="active"{% endif %}>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Upload Timetable
        </a>
        <a href="/view/timetable" {% if request.path == '/view/timetable' %}class="active"{% endif %}>
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          View Timetable
        </a>
      </nav>
    </div>

    <div class="sidebar-bottom">
      <a href="/logout">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </a>
    </div>
  </aside>

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<script>
  function closePopup() {
    const overlay = document.querySelector(".flash-overlay");
    if (overlay) overlay.style.display = "none";
  }
</script>

</body>
</html>
